# Phase 1: Data Preprocessing & Sanitization Configuration
# Target dataset: WUSTL-EHMS-2020 (Enhanced Healthcare Monitoring System)
#
# Raw CSV: 44 features (35 network + 8 biometric + 1 label)
#   Network:   Dir, Flgs, SrcAddr, DstAddr, Sport, Dport, SrcBytes, DstBytes,
#              SrcLoad, DstLoad, SrcGap, DstGap, SIntPkt, DIntPkt, SIntPktAct,
#              DIntPktAct, SrcJitter, DstJitter, sMaxPktSz, dMaxPktSz,
#              sMinPktSz, dMinPktSz, Dur, Trans, TotPkts, TotBytes, Load,
#              Loss, pLoss, pSrcLoss, pDstLoss, Rate, SrcMac, DstMac, Packet_num
#   Biometric: Temp, SpO2, Pulse_Rate, SYS, DIA, Heart_rate, Resp_Rate, ST
#   Labels:    Attack Category, Label

data:
  input_dir: "data/raw/WUSTL-EHMS"
  output_dir: "data/processed"
  file_pattern: "*.csv"
  label_column: "Label"
  multi_label_column: "Attack Category"

# ── Step 1: Identifier Sanitization ──────────────────────────────────────
# Remove MAC/address identifiers implicated in labeling
# (Source MAC perfectly separates normal/attack — used for labeling)
identifier_removal:
  enabled: true
  remove_columns:
    - "SrcAddr"
    - "DstAddr"
    - "SrcMac"          # used for labeling → leakage
    - "DstMac"
    - "Packet_num"      # sequential index → temporal leakage

# ── Step 2: Encode Non-Numeric Features ──────────────────────────────────
encoding:
  label_encode:
    - "Dir"
    - "Flgs"
  parse_numeric:
    - "Sport"
  parse_numeric_sentinel: -1

# ── Step 3: Data Cleaning ────────────────────────────────────────────────
# Handle missing data and outliers
cleaning:
  biometric_strategy: "ffill"
  biometric_columns:
    - "Temp"
    - "SpO2"
    - "Pulse_Rate"
    - "SYS"
    - "DIA"
    - "Heart_rate"
    - "Resp_Rate"
    - "ST"
  network_strategy: "fill_zero"

# ── Step 4a: Remove Unary (Zero-Variance) Features ──────────────────────
variance_filtering:
  enabled: true
  max_unique: 1

# ── Step 4b: Correlation-Based Redundancy Check ─────────────────────────
correlation_removal:
  enabled: true
  threshold: 0.95
  phase0_corr_file: "results/phase0_analysis/high_correlations.csv"

# ══════════════════ LEAKAGE BARRIER ══════════════════════════════════════

# ── Step 5a: Train–Test Split ────────────────────────────────────────────
splitting:
  train_ratio: 0.70
  test_ratio: 0.30
  stratify: true          # stratified on Attack Category
  random_state: 42

# ── Step 6: Scaling (fit on TRAIN, transform TEST) ──────────────────────
normalization:
  method: "robust"

# ══════════════════ DUAL-TRACK BRANCH ════════════════════════════════════
#
# Track A: Supervised classification
#   SMOTE applied inside CV pipeline (not as a standalone step)
#
# Track B: Novelty detection
#   Autoencoder trained on benign-only training data
#   Anomalies flagged by reconstruction error threshold

track_a:
  smote:
    enabled: true
    sampling_strategy: "auto"
    k_neighbors: 5
    random_state: 42

track_b:
  enabled: true
  # Autoencoder config is in Phase 2 detection engine

# ── Export ───────────────────────────────────────────────────────────────
output:
  train_parquet: "train_phase1.parquet"
  test_parquet: "test_phase1.parquet"
  train_benign_parquet: "train_benign_phase1.parquet"   # Track B: benign-only
  scaler_file: "robust_scaler.pkl"
  report_file: "phase1_report.json"

logging:
  file: "logs/phase1_preprocessing.log"
