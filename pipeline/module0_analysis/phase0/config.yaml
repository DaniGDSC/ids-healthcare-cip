dataset:
  data_path: "data/raw/WUSTL-EHMS/wustl-ehms-2020_with_attacks_categories.csv"
  label_column: "Label"
  required_columns:
    - "Label"
    - "Attack Category"

  # Columns dropped before modelling to prevent data leakage
  leakage_columns:
    - "SrcAddr"
    - "DstAddr"
    - "Sport"
    - "Dport"
    - "SrcMac"
    - "DstMac"
    - "Dir"
    - "Flgs"

  # Feature stream membership (for report context)
  network_feature_count: 35
  biometric_feature_count: 8

analysis:
  correlation_threshold: 0.95
  head_rows: 5
  missing_value_warn_pct: 5.0   # log WARNING when a feature exceeds this %
  outlier_iqr_multiplier: 1.5   # IQR fence multiplier for outlier detection
  top_variance_k: 5             # number of features to rank by variance
  random_state: 42
  train_ratio: 0.70
  test_ratio: 0.30

output:
  output_dir: "results/phase0_analysis"
  stats_report_file: "stats_report.json"
  high_correlations_file: "high_correlations.csv"
  correlation_matrix_file: "correlation_matrix.parquet"
  quality_report_file: "report_section_quality.md"
