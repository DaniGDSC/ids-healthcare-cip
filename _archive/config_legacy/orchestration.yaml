orchestration:
  resume: true  # Skip completed phases if checkpoint exists
  checkpoints_dir: "results/checkpoints"
  
  # Checkpoint management settings
  checkpointing:
    enabled: true              # Enable checkpoint save/load across all phases
    keep_latest: 2             # Keep N latest versions per phase
    format: "feather"          # Default format: feather (fast) or parquet (columnar)
  
  # Backup configuration
  backup:
    enabled: true              # Auto-backup after each phase
    backup_dir: "backups"      # Backup root directory
    retention_count: 7         # Keep N latest backups per type
    retention_days: 30         # Keep backups newer than N days
    compression: true          # Use gzip compression for tar archives
  
  # Storage validation
  storage_validation:
    enabled: true              # Check disk space before phases
    fail_on_error: false       # Fail if storage check fails (false = warn only)
    min_free_gb: 10            # Minimum free space required (GB)

  # Config safety: enforce sane bounds and defaults
  # These defaults are also defined in config/loader_schema.py DEFAULT_LOADER_CONFIG
  # for use across all phases. Update both locations if changing loader defaults.
  config_safety:
    defaults:
      phase_timeout_seconds: 3600   # Default per-phase timeout
      retry_delay_seconds: 60       # Default retry backoff
      read_timeout_seconds: 30      # Default per-file read timeout
      max_file_size_mb: 10240       # Per-file size cap (10 GB)
      max_total_size_mb: 51200      # Total dataset cap (50 GB)
      max_memory_mb: 32768          # In-memory DataFrame cap (32 GB)
      memory_threshold_mb: 2000     # Trigger chunking above 2 GB total
    bounds:
      timeout_seconds:
        min: 60
        max: 86400
      retry_delay_seconds:
        min: 0
        max: 3600
      read_timeout_seconds:
        min: 0
        max: 600
      max_file_size_mb:
        min: 10
        max: 204800
      max_total_size_mb:
        min: 100
        max: 409600
      max_memory_mb:
        min: 512
        max: 262144
      memory_threshold_mb:
        min: 128
        max: 131072
  
  phases:
    - name: phase0
      command: "python src/phase0_dataset_analysis/run_phase0.py"
      timeout_seconds: 600
      retries: 1
      retry_delay_seconds: 30
    - name: phase1
      command: "python src/phase1_preprocessing/run_phase1.py"
      timeout_seconds: 3600
      retries: 2
      retry_delay_seconds: 60
    - name: phase2
      command: "python src/phase2_feature_selection/run_phase2.py"
      timeout_seconds: 3600
      retries: 2
      retry_delay_seconds: 60
    - name: phase2_5
      command: "python -m src.phase2_5_fine_tuning.security_hardened_phase2_5"
      timeout_seconds: 7200
      retries: 1
      retry_delay_seconds: 120
    - name: phase3
      command: "python src/phase3_autoencoder/run_phase3.py"
      timeout_seconds: 5400
      retries: 1
      retry_delay_seconds: 120
    - name: phase4
      command: "python src/phase4_clustering/run_phase4.py"
      timeout_seconds: 3600
      retries: 1
      retry_delay_seconds: 60
    - name: phase5
      command: "python src/phase5_classification/run_phase5.py"
      timeout_seconds: 3600
      retries: 1
      retry_delay_seconds: 60