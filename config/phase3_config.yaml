# Phase 3: Classification Engine Configuration
# Detection backbone + classification head with progressive unfreezing
#
# Input:  Phase 1 parquets (29 features) + Phase 2 detection weights (474K params)
# Output: Binary classification (Normal vs Attack) with full evaluation metrics

data:
  phase2_dir: "data/phase2"
  phase1_train: "data/processed/train_phase1.parquet"
  phase1_test: "data/processed/test_phase1.parquet"
  phase2_metadata: "data/phase2/detection_metadata.json"
  phase2_config: "config/phase2_config.yaml"
  label_column: "Label"

classification_head:
  dense_units: 64
  dense_activation: "relu"
  dropout_rate: 0.3

training:
  phases:
    - name: "Phase A — Head only"
      epochs: 5
      learning_rate: 0.001
      frozen: ["cnn", "bilstm1", "bilstm2", "attention"]
    - name: "Phase B — Attention + Head"
      epochs: 5
      learning_rate: 0.0001
      frozen: ["cnn", "bilstm1", "bilstm2"]
    - name: "Phase C — BiLSTM-2 + Attention + Head"
      epochs: 5
      learning_rate: 0.00001
      frozen: ["cnn", "bilstm1"]
  batch_size: 256
  validation_split: 0.2

callbacks:
  early_stopping_patience: 3
  reduce_lr_patience: 2
  reduce_lr_factor: 0.5

evaluation:
  threshold: 0.5

output:
  output_dir: "data/phase3"
  model_file: "classification_model.weights.h5"
  metrics_file: "metrics_report.json"
  confusion_matrix_file: "confusion_matrix.csv"
  history_file: "training_history.json"

random_state: 42

# ── Cross-Dataset Validation (optional) ──────────────────────────────
# Set enabled: true and provide CICIoMT2024 CSV path to run
# cross-dataset generalization evaluation after primary training.
cross_dataset:
  enabled: true
  csv_path: "data/external/CICIoMT2024.csv"
  label_column: "Label"
  scaler_path: "models/scalers/robust_scaler.pkl"
  # CICIoMT2024 column name → WUSTL column name mapping.
  # Only list columns with DIFFERENT names. Identical names auto-map.
  column_mapping: {}
  # Optional label value mapping (e.g., {"Benign": 0, "Malicious": 1})
  # label_mapping:
  #   "Benign": 0
  #   "Malicious": 1
  metrics_file: "metrics_ciciomt.json"
  confusion_matrix_file: "confusion_matrix_ciciomt.csv"
  comparison_report_file: "comparison_report.json"
