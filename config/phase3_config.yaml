# Phase 3: Autoencoder Configuration

data:
  input_dir: "data/features"
  output_dir: "data/latent"
  model_dir: "models/phase3"
  
ml_filter:
  n_estimators: 100
  max_depth: 12
  min_samples_split: 8
  random_state: 42
  n_jobs: -1
  recall_target: 0.995
  
architecture:
  # Input dimension (from Phase 2)
  input_dim: 35
  
  # Latent space dimension
  latent_dim: 8
  
  # Encoder layers (per spec: 28 → 16)
  encoder_layers:
    - 28
    - 16
    
  # Decoder layers (mirror per spec: 16 → 28)
  decoder_layers:
    - 16
    - 28
    
  # Activation functions
  activation: "relu"
  output_activation: "sigmoid"
  
  # Regularization
  dropout_rate: 0.3
  use_batch_normalization: true
  l2_regularization: 0.001

training:
  # Optimization
  optimizer: "adam"
  learning_rate: 0.0005
  batch_size: 256
  epochs: 100
  
  # Early stopping (enabled by default for stability)
  early_stopping:
    enabled: true
    patience: 15
    monitor: "val_loss"
    restore_best_weights: true
    
  # Learning rate reduction (enabled by default for fine-tuning)
  reduce_lr:
    enabled: true
    monitor: "val_loss"
    patience: 5
    factor: 0.5
    min_lr: 0.000001
    
  # Validation
  validation_split: 0.0  # Use separate validation set
  shuffle: true
  
  # Performance optimizations
  mixed_precision: false  # Set to true for GPU speedup (requires GPU with FP16 support)
  use_xla: false          # Set to true for XLA JIT compilation speedup (requires TensorFlow 2.4+)

anomaly_detection:
  # Threshold optimization
  threshold_method: "percentile"  # Options: percentile, std, mad
  percentile: 95  # For percentile method
  n_std: 3  # For std method
  
evaluation:
  metrics:
    - "mse"
    - "mae"
    - "reconstruction_error"
  plot_reconstructions: true
  n_samples_plot: 10

output:
  save_model: true
  save_encoder_only: true
  save_decoder_only: true
  save_latent_representations: true
  model_format: "keras"

logging:
  level: "INFO"
  file: "logs/phase3.log"
  tensorboard: false
  tensorboard_dir: "results/phase3/tensorboard"
