# Production Configuration — IoMT Intrusion Detection System
# All tunable parameters for hospital deployment.
# Override per-hospital via environment-specific YAML.

streaming:
  window_size: 20
  calibration_threshold: 200
  buffer_max_flows: 5000
  buffer_max_predictions: 500
  buffer_max_alerts: 200

model:
  stride: 5

ensemble:
  enabled: true
  iforest_contamination: 0.10
  autoencoder_dim: 8

inference:
  default_device_id: "generic_iomt_sensor"
  warmup_on_load: true
  max_consecutive_failures: 3
  circuit_breaker_reset_after: 10

calibration:
  min_attack_samples: 5
  min_benign_samples: 20
  youden_j_threshold: 0.3
  target_fpr: 0.10
  platt_regularization: 10000.0
  benign_thresholds:
    normal: 30.0
    low: 45.0
    medium: 50.0
    high: 80.0

baseline:
  mad_multiplier: 3.0
  fallback_median: 0.18
  fallback_mad: 0.025
  fallback_threshold: 0.255

risk_scoring:
  low_upper_mad: 0.5
  medium_upper_mad: 1.0
  high_upper_mad: 2.0
  cross_modal_sigma: 2.0

cia:
  escalation_threshold: 0.7

clinical:
  biometric_warn_sigma: 1.5
  biometric_critical_sigma: 2.5
  safety_critical_devices:
    - infusion_pump
    - ecg_monitor
    - pulse_oximeter

alert_feed:
  risk_levels: ["MEDIUM", "HIGH", "CRITICAL"]
  default_visible: ["HIGH", "CRITICAL"]
  max_display: 50

alert_fatigue:
  aggregation_window: 10
  max_alerts_per_window: 5
  rate_window_size: 100

database:
  path: "data/production/iomt_ids.db"
  log_predictions: true
  log_alerts: true
  log_access: true
  retention_days: 90

audit:
  hmac_key_env: "AUDIT_HMAC_KEY"

alerting:
  enabled: true
  dry_run: true
  safety_flag_escalation: true
  safety_recipients:
    - "charge-nurse@hospital.internal"
    - "on-call-physician@hospital.internal"
  recipients:
    3: ["soc-analyst@hospital.internal"]
    4: ["biomed-eng@hospital.internal", "charge-nurse@hospital.internal"]
    5: ["it-security@hospital.internal", "on-call-physician@hospital.internal"]

tls:
  enabled: false  # true for production
  cert_dir: "config/certs/test"
  min_version: "TLSv1.2"

simulation:
  inter_arrival_min: 0.01
  inter_arrival_max: 0.05

auth:
  mode: "open"  # "open" | "local" | "ldap"
  session_ttl: 28800
  users:
    - username: "analyst"
      role: "IT Security Analyst"
    - username: "admin"
      role: "Clinical IT Administrator"
    - username: "doctor"
      role: "Attending Physician"
    - username: "manager"
      role: "Hospital Manager"
    - username: "auditor"
      role: "Regulatory Auditor"
