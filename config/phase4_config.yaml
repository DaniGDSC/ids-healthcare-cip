# Phase 4 — Risk-Adaptive Engine Configuration
# Consumes Phase 2.5 finetuned model + Phase 2 attention output

data:
  # Phase 3 artifacts (SHA-256 verified before loading)
  phase3_dir: "data/phase3"
  phase3_metadata: "data/phase3/classification_metadata.json"

  # Phase 2 attention output (SHA-256 verified before loading)
  phase2_dir: "data/phase2"
  phase2_metadata: "data/phase2/detection_metadata.json"

  # Phase 1 preprocessed data (for model inference)
  phase1_train: "data/processed/train_phase1.parquet"
  phase1_test: "data/processed/test_phase1.parquet"
  label_column: "Label"

  # Phase 2.5 finetuned model (preferred over Phase 3 baseline)
  finetuned_weights: "data/phase2_5/finetuned_model.weights.h5"
  finetuned_results: "data/phase2_5/finetuned_results.json"

# ── CIA Adaptive Priority Shifting ─────────────────────────────────
# Scenarios:
#   Normal Monitoring:  I >= C > A  (data privacy + diagnostic accuracy)
#   Clinical Emergency: A > I > C   (immediate access vital)
#   High Threat:        I > A > C   (prevent tampering / malicious control)
cia:
  enabled: true
  escalation_threshold: 0.7
  default_device_id: "generic_iomt_sensor"

  threat_mappings:
    - attack_category: "Spoofing"
      cia_weights: { confidentiality: 0.6, integrity: 0.9, availability: 0.3 }
    - attack_category: "Data Alteration"
      cia_weights: { confidentiality: 0.3, integrity: 1.0, availability: 0.2 }
    - attack_category: "unknown"
      cia_weights: { confidentiality: 0.5, integrity: 0.5, availability: 0.5 }

  device_registry:
    - device_type: "infusion_pump"
      fda_class: "III"
      cia_priority: { confidentiality: 0.4, integrity: 1.0, availability: 1.0 }
      description: "IV medication delivery — availability-critical"
    - device_type: "ecg_monitor"
      fda_class: "III"
      cia_priority: { confidentiality: 0.5, integrity: 1.0, availability: 1.0 }
      description: "Cardiac monitoring — integrity and availability critical"
    - device_type: "pulse_oximeter"
      fda_class: "II"
      cia_priority: { confidentiality: 0.3, integrity: 0.9, availability: 0.8 }
    - device_type: "generic_iomt_sensor"
      fda_class: "II"
      cia_priority: { confidentiality: 0.4, integrity: 0.8, availability: 0.7 }

baseline:
  # Median + k*MAD on Normal-only attention scores
  mad_multiplier: 3.0

dynamic_threshold:
  window_size: 100
  # Time-of-day sensitivity multipliers
  k_schedule:
    - start_hour: 0
      end_hour: 6
      k: 2.5
    - start_hour: 6
      end_hour: 22
      k: 3.0
    - start_hour: 22
      end_hour: 24
      k: 3.5

concept_drift:
  drift_threshold: 0.20
  recovery_threshold: 0.10
  recovery_windows: 3

risk_levels:
  # distance = anomaly_score - current_threshold
  # MAD-relative boundaries
  low_upper: 0.5       # distance < 0.5*MAD
  medium_upper: 1.0    # distance < 1.0*MAD
  high_upper: 2.0      # distance < 2.0*MAD
  # CRITICAL: distance >= 2.0*MAD AND cross-modal fusion

biometric_columns:
  - "Temp"
  - "SpO2"
  - "Pulse_Rate"
  - "SYS"
  - "DIA"
  - "Heart_rate"
  - "Resp_Rate"
  - "ST"

output:
  output_dir: "data/phase4"
  baseline_file: "baseline_config.json"
  threshold_file: "threshold_config.json"
  risk_report_file: "risk_report.json"
  drift_log_file: "drift_log.csv"

random_state: 42
