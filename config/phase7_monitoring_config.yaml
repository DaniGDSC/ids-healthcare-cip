# Phase 7 — Monitoring Engine Configuration
# Runs as a SEPARATE process; never imported by other phases.

monitoring:
  heartbeat_interval_seconds: 5
  missed_heartbeat_threshold: 5
  grace_period_seconds: 25
  storage: state_changes_only
  circular_buffer_size: 1000
  performance_collection_interval: 30
  artifact_integrity_check_interval: 60
  latency_p95_threshold_ms: 100
  memory_warning_threshold_pct: 80
  cpu_warning_threshold_pct: 90

security:
  baseline_config_path: "data/phase4/baseline_config.json"
  baseline_check_interval_seconds: 30

output:
  output_dir: "data/phase7"

pipeline:
  n_cycles: 5
  random_state: 42

# Engine registry (Open/Closed — add new engines without code change)
engines:
  - id: phase2_detection
    heartbeat_topic: detection.heartbeat
    artifact_dir: "data/phase2"
    metadata_path: "data/phase2/detection_metadata.json"
    name: "Detection Engine"
  - id: phase3_classification
    heartbeat_topic: classification.heartbeat
    artifact_dir: "data/phase3"
    metadata_path: "data/phase3/classification_metadata.json"
    name: "Classification Engine"
  - id: phase4_risk_adaptive
    heartbeat_topic: risk_adaptive.heartbeat
    artifact_dir: "data/phase4"
    metadata_path: "data/phase4/risk_metadata.json"
    name: "Risk-Adaptive Engine"
  - id: phase5_explanation
    heartbeat_topic: explanation.heartbeat
    artifact_dir: "data/phase5"
    metadata_path: "data/phase5/explanation_metadata.json"
    name: "Explanation Engine"
  - id: phase6_notification
    heartbeat_topic: notification.heartbeat
    artifact_dir: "data/phase6"
    name: "Notification Engine"
