# Phase 2: Detection Engine Configuration
# CNN → BiLSTM → Attention feature extraction
#
# Input:  Phase 1 parquet (24 features, RobustScaler-normalised)
# Output: 128-dim attention context vectors (no classification head)

data:
  train_parquet: "data/processed/train_phase1.parquet"
  test_parquet: "data/processed/test_phase1.parquet"
  metadata_file: "data/processed/preprocessing_metadata.json"
  report_file: "data/processed/phase1_report.json"
  label_column: "Label"

reshape:
  timesteps: 20
  stride: 1

cnn:
  filters_1: 64
  filters_2: 128
  kernel_size: 3
  activation: "relu"
  pool_size: 2

bilstm:
  units_1: 128
  units_2: 64
  dropout_rate: 0.3

attention:
  units: 128

output:
  output_dir: "data/phase2"
  model_file: "detection_model.weights.h5"
  attention_parquet: "attention_output.parquet"
  report_file: "detection_report.json"

random_state: 42
