# Phase 1: Data Preprocessing & Sanitization Configuration
# Target dataset: WUSTL-EHMS-2020 (Enhanced Healthcare Monitoring System)
#
# Actual CSV columns (45):
#   Network:   Dir, Flgs, SrcAddr, DstAddr, Sport, Dport, SrcBytes, DstBytes,
#              SrcLoad, DstLoad, SrcGap, DstGap, SIntPkt, DIntPkt, SIntPktAct,
#              DIntPktAct, SrcJitter, DstJitter, sMaxPktSz, dMaxPktSz,
#              sMinPktSz, dMinPktSz, Dur, Trans, TotPkts, TotBytes, Load,
#              Loss, pLoss, pSrcLoss, pDstLoss, Rate, SrcMac, DstMac, Packet_num
#   Biometric: Temp, SpO2, Pulse_Rate, SYS, DIA, Heart_rate, Resp_Rate, ST
#   Labels:    Attack Category, Label

data:
  input_dir: "data/raw/WUSTL-EHMS"
  output_dir: "data/processed"
  file_pattern: "*.csv"
  label_column: "Label"

# ── Step 2: HIPAA Safe Harbor Sanitization ──────────────────────────────
hipaa:
  enabled: true
  # Columns to DROP (actual CSV names for network + temporal identifiers)
  remove_columns:
    # Network Identifiers
    - "SrcAddr"
    - "DstAddr"
    - "Sport"
    - "Dport"
    # MAC Identifiers
    - "SrcMac"
    - "DstMac"
    # Direction / Flag metadata (not features, but flow metadata)
    - "Dir"
    - "Flgs"

# ── Step 3: Context-Aware Missing Value Handling ────────────────────────
missing_values:
  biometric_strategy: "ffill"
  biometric_columns:
    - "Temp"
    - "SpO2"
    - "Pulse_Rate"
    - "SYS"
    - "DIA"
    - "Heart_rate"
    - "Resp_Rate"
    - "ST"
  network_strategy: "dropna"
  network_missing_threshold: 0.05

# ── Step 4: Redundancy Elimination ──────────────────────────────────────
correlation_removal:
  enabled: true
  threshold: 0.95
  phase0_corr_file: "results/phase0_analysis/high_correlations.csv"

# ── Step 5: Stratified Train/Test Split ─────────────────────────────────
splitting:
  train_ratio: 0.70
  test_ratio: 0.30
  stratify: true
  random_state: 42

# ── Step 6: SMOTE (train set only) ──────────────────────────────────────
smote:
  enabled: true
  # "auto" balances minority to majority (1:1). Use a float (e.g. 0.5) for
  # a partial resample (minority:majority = 1:2), which is less aggressive
  # and preserves some natural imbalance signal for downstream models.
  sampling_strategy: "auto"
  k_neighbors: 5       # k for the k-NN interpolation; reduce to 3 on very small minority classes
  random_state: 42

# ── Step 7: Data Scaling (RobustScaler) ─────────────────────────────────
normalization:
  method: "robust"  # IQR-based; robust to outliers; preserves attack signature morphology for XAI

# ── Step 8: Artifact Export ─────────────────────────────────────────────
output:
  train_parquet: "train_phase1.parquet"
  test_parquet: "test_phase1.parquet"
  scaler_file: "robust_scaler.pkl"
  report_file: "phase1_report.json"

logging:
  file: "logs/phase1_preprocessing.log"
