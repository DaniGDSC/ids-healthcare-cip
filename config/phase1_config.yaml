# Phase 1: Data Preprocessing Configuration

data_loading:
  file_pattern: "*.csv"
  encoding: "utf-8"
  low_memory: false
  chunksize: null  # Load entire file at once

cleaning:
  remove_missing_threshold: 0.95  # Remove columns with >95% missing
  remove_duplicates: true
  remove_infinite: true
  handle_negatives: true  # Remove negative values in positive-only features

hipaa_compliance:
  enable_deidentification: true
  anonymize_ips: true
  log_access: true
  remove_phi_columns: true
  remove_columns:
    - "Timestamp"
    - "Flow Timestamp"
    - "Src IP"
    - "Dst IP"
    - "Source IP"
    - "Destination IP"
    - "Source Port"
    - "Destination Port"
  pseudonymize_columns: []  # Already removed
  truncate_timestamps: true  # Year/month only
  encryption_at_rest: false

correlation_removal:
  enabled: true
  threshold: 0.95  # Remove features with correlation > 0.95
  method: "pearson"

splitting:
  train_ratio: 0.60
  val_ratio: 0.20
  test_ratio: 0.20
  stratify: true
  random_state: 42

normalization:
  method: "standard"  # StandardScaler
  with_mean: true
  with_std: true

label_normalization:
  enabled: true
  drop_unknown: true
  mapping:
    "Benign": "Benign"
    "DDoS attacks-LOIC-HTTP": "DDoS"
    "DDoS attacks-LOIC-UDP": "DDoS"
    "DDoS attacks-HOIC": "DDoS"
    "DoS attacks-GoldenEye": "DoS"
    "DoS attacks-Slowloris": "DoS"
    "DoS attacks-SlowHTTPTest": "DoS"
    "DoS attacks-Hulk": "DoS"
    "Brute Force -Web": "BruteForce"
    "Brute Force -XSS": "BruteForce"
    "SSH-Bruteforce": "BruteForce"
    "FTP-BruteForce": "BruteForce"
    "SQL Injection": "WebAttack"
    "Infiltration": "Infiltration"
    "Bot": "Bot"

output:
  save_csv: false  # Save space
  save_npz: true   # Compressed format
  save_metadata: true