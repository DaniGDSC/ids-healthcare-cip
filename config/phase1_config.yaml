# Phase 1: Data Preprocessing Configuration

data_loading:
  # Note: Loader defaults are defined in config/loader_schema.py DEFAULT_LOADER_CONFIG
  # Only specify overrides here to avoid duplication with orchestration.yaml
  
  # File discovery (override defaults if needed)
  # file_pattern: "*.csv"  # Default
  # encoding: "utf-8"      # Default
  # low_memory: false      # Default
  # chunksize: null        # Default (load entire file)
  
  # Smart loading (override defaults if needed)
  # use_smart_loading: true         # Default
  # memory_threshold_mb: 2000       # Default (2 GB)
  # io_workers: 4                   # Default
  # loader: "default"               # Default
  
  # Retry/timeout (override defaults if needed)
  # io_retries: 2                   # Default
  # io_retry_delay_seconds: 2       # Default
  # read_timeout_seconds: 30        # Default
  # skip_on_error: true             # Default
  # quarantine_dir: "data/quarantine"  # Default
  
  # Size limits - OVERRIDE THESE if your dataset is larger than defaults
  # Defaults from orchestration.yaml config_safety.defaults:
  #   max_file_size_mb: 10240 (10 GB)
  #   max_total_size_mb: 51200 (50 GB)
  #   max_memory_mb: 32768 (32 GB)
  #
  # For CSE-CIC-IDS2018, we need higher limits:
  max_file_size_mb: 12000     # 12 GB (larger than default for big daily files)
  max_total_size_mb: 60000    # 60 GB (accommodate full dataset)
  # max_memory_mb: 32768      # Keep default (32 GB is sufficient)
  
  # Data directories
  input_dir: "data/raw/CSE-CIC-IDS2018"
  output_dir: "data/processed"
  splits_dir: "data/splits"

cleaning:
  remove_missing_threshold: 0.95  # Remove columns with >95% missing
  remove_duplicates: true
  remove_infinite: true
  handle_negatives: true  # Remove negative values in positive-only features

hipaa_compliance:
  enable_deidentification: true
  anonymize_ips: true
  log_access: true
  remove_phi_columns: true
  remove_columns:
    - "Timestamp"
    - "Flow Timestamp"
    - "Src IP"
    - "Dst IP"
    - "Source IP"
    - "Destination IP"
    - "Source Port"
    - "Destination Port"
  pseudonymize_columns: []  # Already removed
  truncate_timestamps: true  # Year/month only
  encryption_at_rest: false

correlation_removal:
  enabled: true
  threshold: 0.95  # Remove features with correlation > 0.95
  method: "pearson"

splitting:
  train_ratio: 0.60
  val_ratio: 0.20
  test_ratio: 0.20
  stratify: true
  random_state: 42

normalization:
  method: "standard"  # StandardScaler
  with_mean: true
  with_std: true

label_normalization:
  enabled: true
  drop_unknown: true
  mapping:
    "Benign": "Benign"
    "DDoS attacks-LOIC-HTTP": "DDoS"
    "DDoS attacks-LOIC-UDP": "DDoS"
    "DDoS attacks-HOIC": "DDoS"
    "DoS attacks-GoldenEye": "DoS"
    "DoS attacks-Slowloris": "DoS"
    "DoS attacks-SlowHTTPTest": "DoS"
    "DoS attacks-Hulk": "DoS"
    "Brute Force -Web": "BruteForce"
    "Brute Force -XSS": "BruteForce"
    "SSH-Bruteforce": "BruteForce"
    "FTP-BruteForce": "BruteForce"
    "SQL Injection": "WebAttack"
    "Infiltration": "Infiltration"
    "Bot": "Bot"

output:
  save_csv: false  # Save space
  save_npz: true   # Compressed format
  save_metadata: true

checkpointing:
  enabled: true                 # Enable checkpoint save/load
  allow_resume: true            # Resume from last checkpoint if available
  checkpoint_dir: "results/checkpoints"
  keep_latest: 2                # Keep N latest versions per phase
