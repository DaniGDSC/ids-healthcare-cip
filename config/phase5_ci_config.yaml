# Phase 5 — Explanation Engine Configuration (CI Environment)
#
# Optimized for CI speed: reduced background_samples and max_explain_samples.
# Selected via PHASE5_ENV=ci environment variable.
# Production config: config/phase5_config.yaml

data:
  phase4_dir: "data/phase4"
  phase4_metadata: "data/phase4/risk_metadata.json"
  phase3_dir: "data/phase3"
  phase3_metadata: "data/phase3/classification_metadata.json"
  phase2_dir: "data/phase2"
  phase2_metadata: "data/phase2/detection_metadata.json"
  phase1_train: "data/processed/train_phase1.parquet"
  phase1_test: "data/processed/test_phase1.parquet"
  label_column: "Label"

shap:
  background_samples: 10
  max_explain_samples: 20
  top_features: 10
  max_waterfall_charts: 5
  max_timeline_charts: 3

output:
  output_dir: "data/phase5"
  shap_values_file: "shap_values.parquet"
  explanation_report_file: "explanation_report.json"
  metadata_file: "explanation_metadata.json"
  charts_dir: "charts"

explanation_templates:
  CRITICAL: >-
    CRITICAL ALERT: Sample {idx} at T={time}.
    Top factors: {f1} anomaly ({p1:.1f}%),
    {f2} anomaly ({p2:.1f}%),
    {f3} anomaly ({p3:.1f}%).
    Immediate action required.
  HIGH: >-
    HIGH ALERT: Suspicious activity detected at sample {idx}.
    Primary indicator: {f1} anomaly contributing {p1:.1f}%.
  MEDIUM: >-
    MEDIUM: Anomaly detected at sample {idx}.
    Monitor closely. Key feature: {f1}.
  LOW: "LOW: Minor anomaly at sample {idx}. No immediate action needed."

biometric_columns:
  - Temp
  - SpO2
  - Pulse_Rate
  - SYS
  - DIA
  - Heart_rate
  - Resp_Rate
  - ST

random_state: 42
