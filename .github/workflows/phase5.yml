name: Phase 5 — Lint · Test · Security · Integration · Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ["Phase 4 — Lint · Test · Security · Integration · Build"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs on new pushes to the same branch
concurrency:
  group: phase5-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Lint Phase 5 code (ruff + black)
  # ─────────────────────────────────────────────────────────────────
  lint-phase5:
    runs-on: ubuntu-latest
    # Skip if triggered by workflow_run and Phase 4 failed
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: Ruff — Phase 5
        run: ruff check src/phase5_explanation_engine/

      - name: Black — Phase 5
        run: black --check src/phase5_explanation_engine/

  # ─────────────────────────────────────────────────────────────────
  # 2. Unit tests for Phase 5 (coverage >= 80%)
  # ─────────────────────────────────────────────────────────────────
  test-phase5:
    runs-on: ubuntu-latest
    needs: lint-phase5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov pytest-benchmark pydantic

      - name: Run Phase 5 unit tests with coverage
        env:
          CUDA_VISIBLE_DEVICES: ""
          TF_DETERMINISTIC_OPS: "1"
          MPLBACKEND: Agg
        run: >
          python -m pytest
          src/phase5_explanation_engine/phase5/tests/
          -v
          --cov=src/phase5_explanation_engine/phase5
          --cov-report=xml:coverage-phase5.xml
          --cov-report=term-missing
          --cov-fail-under=80

      - name: Upload Phase 5 coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-phase5
          path: coverage-phase5.xml

  # ─────────────────────────────────────────────────────────────────
  # 3. Security scan (Phase 5 additions)
  # ─────────────────────────────────────────────────────────────────
  security-scan-phase5:
    runs-on: ubuntu-latest
    needs: lint-phase5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools + dependencies
        run: |
          pip install -r requirements.txt pydantic
          pip install bandit[toml] pip-audit cyclonedx-bom

      - name: Bandit — Phase 5 static analysis
        run: bandit -r src/phase5_explanation_engine/ -c pyproject.toml -ll

      - name: pip-audit — dependency vulnerabilities (fail CVSS > 7.0)
        run: pip-audit --strict --desc

      - name: CycloneDX SBOM (Phase 0–5 combined)
        run: cyclonedx-py requirements -i requirements.txt -o sbom-phase5.json --format json

      - name: Verify shap in SBOM
        run: |
          python -c "
          import json
          sbom = json.load(open('sbom-phase5.json'))
          names = [c.get('name','') for c in sbom.get('components',[])]
          assert 'shap' in names, f'shap missing from SBOM'
          print(f'SBOM OK: {len(names)} components, shap present')
          "

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-phase5
          path: sbom-phase5.json

  # ─────────────────────────────────────────────────────────────────
  # 4. Integration test — Phase 0 → 1 → 2 → 3 → 4 → 5 end-to-end
  # ─────────────────────────────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: [test-phase5, security-scan-phase5]
    env:
      CUDA_VISIBLE_DEVICES: ""
      TF_DETERMINISTIC_OPS: "1"
      MPLBACKEND: Agg
      PHASE5_ENV: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pydantic

      # ── Phase 0: Create 100-row test subset ──
      - name: Create 100-row test subset
        run: |
          python -c "
          import pandas as pd, numpy as np, os, json, hashlib

          df = pd.read_csv('data/raw/WUSTL-EHMS/wustl-ehms-2020_with_attacks_categories.csv', low_memory=False)
          normal = df[df['Label'] == 0].head(80)
          attack = df[df['Label'] == 1].head(20)
          subset = pd.concat([normal, attack], ignore_index=True)

          os.makedirs('data/ci_test/WUSTL-EHMS', exist_ok=True)
          subset_path = 'data/ci_test/WUSTL-EHMS/wustl-ehms-2020_with_attacks_categories.csv'
          subset.to_csv(subset_path, index=False)

          os.makedirs('results/ci_test', exist_ok=True)
          h = hashlib.sha256()
          with open(subset_path, 'rb') as f:
              while chunk := f.read(65536):
                  h.update(chunk)
          digest = h.hexdigest()
          metadata = {subset_path: {'sha256': digest, 'verified_at': '2026-01-01T00:00:00+00:00'}}
          with open('results/ci_test/dataset_integrity.json', 'w') as f:
              json.dump(metadata, f, indent=2)
          print(f'Subset: {len(subset)} rows, SHA-256: {digest[:16]}...')
          "

      - name: Generate Phase 0 artifacts for subset
        run: |
          python -c "
          import pandas as pd, numpy as np, json, os

          df = pd.read_csv('data/ci_test/WUSTL-EHMS/wustl-ehms-2020_with_attacks_categories.csv', low_memory=False)
          os.makedirs('results/ci_test', exist_ok=True)

          numeric_df = df.select_dtypes(include='number')
          stats = {
              'descriptive_statistics': {col: {'mean': float(numeric_df[col].mean())} for col in numeric_df.columns},
              'missing_values': {col: int(df[col].isna().sum()) for col in df.columns},
              'class_distribution': {'Normal': {'count': int((df['Label']==0).sum())}, 'Attack': {'count': int((df['Label']==1).sum())}},
          }
          with open('results/ci_test/stats_report.json', 'w') as f:
              json.dump(stats, f, indent=2)

          corr = numeric_df.drop(columns=['Label'], errors='ignore').corr().abs()
          pairs = []
          for i in range(len(corr)):
              for j in range(i+1, len(corr)):
                  if corr.iloc[i,j] >= 0.95:
                      pairs.append({'feature_a': corr.index[i], 'feature_b': corr.columns[j], 'correlation': round(float(corr.iloc[i,j]), 6)})
          pd.DataFrame(pairs).to_csv('results/ci_test/high_correlations.csv', index=False)
          print(f'Phase 0 artifacts: stats OK, {len(pairs)} high-correlation pairs')
          "

      # ── Phase 1: Preprocessing ──
      - name: Run Phase 1 pipeline on subset
        run: |
          cat > config/ci_test_phase1.yaml << 'YAMLEOF'
          data:
            input_dir: "data/ci_test/WUSTL-EHMS"
            output_dir: "data/ci_test/processed"
            file_pattern: "*.csv"
            label_column: "Label"

          hipaa:
            enabled: true
            remove_columns:
              - "SrcAddr"
              - "DstAddr"
              - "Sport"
              - "Dport"
              - "SrcMac"
              - "DstMac"
              - "Dir"
              - "Flgs"

          missing_values:
            biometric_strategy: "ffill"
            biometric_columns:
              - "Temp"
              - "SpO2"
              - "Pulse_Rate"
              - "SYS"
              - "DIA"
              - "Heart_rate"
              - "Resp_Rate"
              - "ST"
            network_strategy: "dropna"

          correlation_removal:
            enabled: true
            threshold: 0.95
            phase0_corr_file: "results/ci_test/high_correlations.csv"

          splitting:
            train_ratio: 0.70
            test_ratio: 0.30
            stratify: true
            random_state: 42

          smote:
            enabled: true
            sampling_strategy: "auto"
            k_neighbors: 3
            random_state: 42

          normalization:
            method: "robust"

          output:
            train_parquet: "train_phase1.parquet"
            test_parquet: "test_phase1.parquet"
            scaler_file: "robust_scaler.pkl"
            report_file: "phase1_report.json"
          YAMLEOF

          python -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')

          from pathlib import Path
          from src.phase1_preprocessing.phase1.config import Phase1Config
          from src.phase1_preprocessing.phase1.artifact_reader import Phase0ArtifactReader
          from src.phase1_preprocessing.phase1.pipeline import PreprocessingPipeline

          PROJECT_ROOT = Path.cwd()
          config = Phase1Config.from_yaml(PROJECT_ROOT / 'config' / 'ci_test_phase1.yaml')
          reader = Phase0ArtifactReader(
              project_root=PROJECT_ROOT,
              stats_file=Path('results/ci_test/stats_report.json'),
              corr_file=config.phase0_corr_file,
              integrity_file=Path('results/ci_test/dataset_integrity.json'),
          )
          pipeline = PreprocessingPipeline(config, reader, PROJECT_ROOT)
          report = pipeline.run()
          print(f'Phase 1 complete: {report[\"output\"][\"n_features\"]} features')
          "

      # ── Phase 2: Detection ──
      - name: Run Phase 2 pipeline on subset
        run: |
          python -c "
          import pandas as pd, hashlib, json, os, yaml, logging
          import numpy as np
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          os.environ['CUDA_VISIBLE_DEVICES'] = ''

          from pathlib import Path
          import tensorflow as tf
          tf.random.set_seed(42)
          np.random.seed(42)

          train_path = Path('data/ci_test/processed/train_phase1.parquet')
          test_path = Path('data/ci_test/processed/test_phase1.parquet')
          train = pd.read_parquet(train_path)
          feature_names = [c for c in train.columns if c != 'Label']

          def sha256(p):
              h = hashlib.sha256()
              with open(p, 'rb') as f:
                  while chunk := f.read(65536):
                      h.update(chunk)
              return h.hexdigest()

          metadata = {
              'artifact_hashes': {
                  'train_phase1.parquet': {'sha256': sha256(train_path)},
                  'test_phase1.parquet': {'sha256': sha256(test_path)},
              }
          }
          Path('data/ci_test/processed/preprocessing_metadata.json').write_text(json.dumps(metadata, indent=2))

          report_path = Path('data/ci_test/processed/phase1_report.json')
          report = json.loads(report_path.read_text())
          if 'output' not in report:
              report['output'] = {}
          report['output']['feature_names'] = feature_names
          report_path.write_text(json.dumps(report, indent=2))

          config = {
              'data': {
                  'train_parquet': 'data/ci_test/processed/train_phase1.parquet',
                  'test_parquet': 'data/ci_test/processed/test_phase1.parquet',
                  'metadata_file': 'data/ci_test/processed/preprocessing_metadata.json',
                  'report_file': 'data/ci_test/processed/phase1_report.json',
                  'label_column': 'Label',
              },
              'reshape': {'timesteps': 5, 'stride': 1},
              'cnn': {'filters_1': 32, 'filters_2': 64, 'kernel_size': 3, 'activation': 'relu', 'pool_size': 2},
              'bilstm': {'units_1': 32, 'units_2': 16, 'dropout_rate': 0.3},
              'attention': {'units': 32},
              'output': {
                  'output_dir': 'data/ci_test/phase2',
                  'model_file': 'detection_model.weights.h5',
                  'attention_parquet': 'attention_output.parquet',
                  'report_file': 'detection_report.json',
              },
              'random_state': 42,
          }
          with open('config/ci_test_phase2.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)

          from src.phase2_detection_engine.phase2.config import Phase2Config
          from src.phase2_detection_engine.phase2.artifact_reader import Phase1ArtifactReader
          from src.phase2_detection_engine.phase2.pipeline import DetectionPipeline

          PROJECT_ROOT = Path.cwd()
          p2_config = Phase2Config.from_yaml(PROJECT_ROOT / 'config' / 'ci_test_phase2.yaml')
          reader = Phase1ArtifactReader(
              project_root=PROJECT_ROOT,
              train_parquet=p2_config.train_parquet,
              test_parquet=p2_config.test_parquet,
              metadata_file=p2_config.metadata_file,
              report_file=p2_config.report_file,
              label_column=p2_config.label_column,
          )
          pipeline = DetectionPipeline(p2_config, reader, PROJECT_ROOT)
          p2_report = pipeline.run()
          print(f'Phase 2 complete — {p2_report[\"total_parameters\"]} params')
          "

      # ── Phase 3: Classification ──
      - name: Run Phase 3 pipeline on subset
        run: |
          python -c "
          import json, os, hashlib, yaml, logging
          import numpy as np, pandas as pd
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          os.environ['CUDA_VISIBLE_DEVICES'] = ''

          import tensorflow as tf
          tf.random.set_seed(42)
          np.random.seed(42)

          from pathlib import Path

          p2_dir = Path('data/ci_test/phase2')

          def sha256(p):
              h = hashlib.sha256()
              with open(p, 'rb') as f:
                  while chunk := f.read(65536):
                      h.update(chunk)
              return h.hexdigest()

          detection_metadata = {
              'hyperparameters': {
                  'timesteps': 5, 'stride': 1,
                  'cnn_filters_1': 32, 'cnn_filters_2': 64,
                  'cnn_kernel_size': 3, 'cnn_activation': 'relu', 'cnn_pool_size': 2,
                  'bilstm_units_1': 32, 'bilstm_units_2': 16,
                  'dropout_rate': 0.3, 'attention_units': 32,
              },
              'artifact_hashes': {
                  'detection_model.weights.h5': {'sha256': sha256(p2_dir / 'detection_model.weights.h5'), 'algorithm': 'SHA-256'},
                  'attention_output.parquet': {'sha256': sha256(p2_dir / 'attention_output.parquet'), 'algorithm': 'SHA-256'},
              },
          }
          (p2_dir / 'detection_metadata.json').write_text(json.dumps(detection_metadata, indent=2))

          config = {
              'data': {
                  'phase2_dir': 'data/ci_test/phase2',
                  'phase1_train': 'data/ci_test/processed/train_phase1.parquet',
                  'phase1_test': 'data/ci_test/processed/test_phase1.parquet',
                  'phase2_metadata': 'data/ci_test/phase2/detection_metadata.json',
                  'label_column': 'Label',
              },
              'classification_head': {'dense_units': 32, 'dense_activation': 'relu', 'head_dropout_rate': 0.3},
              'training': {
                  'batch_size': 32, 'validation_split': 0.2,
                  'phases': [
                      {'name': 'Phase A — Head only', 'epochs': 2, 'learning_rate': 0.001,
                       'frozen': ['cnn', 'bilstm1', 'bilstm2', 'attention']},
                      {'name': 'Phase B — Attention + Head', 'epochs': 2, 'learning_rate': 0.0001,
                       'frozen': ['cnn', 'bilstm1', 'bilstm2']},
                  ],
              },
              'callbacks': {'early_stopping_patience': 3, 'reduce_lr_patience': 2, 'reduce_lr_factor': 0.5},
              'evaluation': {'threshold': 0.5},
              'output': {
                  'output_dir': 'data/ci_test/phase3',
                  'model_file': 'classification_model.weights.h5',
                  'metrics_file': 'metrics_report.json',
                  'confusion_matrix_file': 'confusion_matrix.csv',
                  'history_file': 'training_history.json',
              },
              'random_state': 42,
          }
          with open('config/ci_test_phase3.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)

          from src.phase3_classification_engine.phase3.config import Phase3Config
          from src.phase3_classification_engine.phase3.artifact_reader import Phase2ArtifactReader
          from src.phase3_classification_engine.phase3.head import AutoClassificationHead
          from src.phase3_classification_engine.phase3.unfreezer import ProgressiveUnfreezer
          from src.phase3_classification_engine.phase3.trainer import ClassificationTrainer
          from src.phase3_classification_engine.phase3.evaluator import ModelEvaluator
          from src.phase3_classification_engine.phase3.exporter import ClassificationExporter
          from src.phase3_classification_engine.phase3.pipeline import ClassificationPipeline

          PROJECT_ROOT = Path.cwd()
          p3_config = Phase3Config.from_yaml(PROJECT_ROOT / 'config' / 'ci_test_phase3.yaml')
          reader = Phase2ArtifactReader(
              project_root=PROJECT_ROOT, phase2_dir=p3_config.phase2_dir,
              metadata_file=p3_config.phase2_metadata, label_column=p3_config.label_column,
          )
          pipeline = ClassificationPipeline(
              config=p3_config, artifact_reader=reader,
              head=AutoClassificationHead(dense_units=p3_config.dense_units, dense_activation=p3_config.dense_activation, dropout_rate=p3_config.head_dropout_rate),
              unfreezer=ProgressiveUnfreezer(),
              trainer=ClassificationTrainer(batch_size=p3_config.batch_size, validation_split=p3_config.validation_split,
                  early_stopping_patience=p3_config.early_stopping_patience, reduce_lr_patience=p3_config.reduce_lr_patience, reduce_lr_factor=p3_config.reduce_lr_factor),
              evaluator=ModelEvaluator(threshold=p3_config.threshold),
              exporter=ClassificationExporter(PROJECT_ROOT / p3_config.output_dir),
              project_root=PROJECT_ROOT,
          )
          metrics = pipeline.run()
          print(f'Phase 3 complete — accuracy={metrics[\"accuracy\"]:.4f}')
          "

      # ── Phase 4: Risk Assessment ──
      - name: Run Phase 4 pipeline on subset
        run: |
          python -c "
          import json, os, hashlib, yaml, logging, stat
          import numpy as np, pandas as pd
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          os.environ['CUDA_VISIBLE_DEVICES'] = ''

          import tensorflow as tf
          tf.random.set_seed(42)
          np.random.seed(42)

          from pathlib import Path

          p3_dir = Path('data/ci_test/phase3')

          def sha256(p):
              h = hashlib.sha256()
              with open(p, 'rb') as f:
                  while chunk := f.read(65536):
                      h.update(chunk)
              return h.hexdigest()

          classification_metadata = {
              'hyperparameters': {'dense_units': 32, 'dense_activation': 'relu', 'head_dropout_rate': 0.3},
              'artifact_hashes': {
                  'classification_model.weights.h5': {'sha256': sha256(p3_dir / 'classification_model.weights.h5'), 'algorithm': 'SHA-256'},
                  'metrics_report.json': {'sha256': sha256(p3_dir / 'metrics_report.json'), 'algorithm': 'SHA-256'},
                  'confusion_matrix.csv': {'sha256': sha256(p3_dir / 'confusion_matrix.csv'), 'algorithm': 'SHA-256'},
                  'training_history.json': {'sha256': sha256(p3_dir / 'training_history.json'), 'algorithm': 'SHA-256'},
              },
          }
          (p3_dir / 'classification_metadata.json').write_text(json.dumps(classification_metadata, indent=2))

          config = {
              'data': {
                  'phase3_dir': 'data/ci_test/phase3',
                  'phase3_metadata': 'data/ci_test/phase3/classification_metadata.json',
                  'phase2_dir': 'data/ci_test/phase2',
                  'phase2_metadata': 'data/ci_test/phase2/detection_metadata.json',
                  'phase1_train': 'data/ci_test/processed/train_phase1.parquet',
                  'phase1_test': 'data/ci_test/processed/test_phase1.parquet',
                  'label_column': 'Label',
              },
              'baseline': {'mad_multiplier': 3.0},
              'dynamic_threshold': {
                  'window_size': 10,
                  'k_schedule': [
                      {'start_hour': 0, 'end_hour': 6, 'k': 2.5},
                      {'start_hour': 6, 'end_hour': 22, 'k': 3.0},
                      {'start_hour': 22, 'end_hour': 24, 'k': 3.5},
                  ],
              },
              'concept_drift': {'drift_threshold': 0.20, 'recovery_threshold': 0.10, 'recovery_windows': 3},
              'risk_levels': {'low_upper': 0.5, 'medium_upper': 1.0, 'high_upper': 2.0},
              'biometric_columns': ['Temp', 'SpO2', 'Pulse_Rate', 'SYS', 'DIA', 'Heart_rate', 'Resp_Rate', 'ST'],
              'output': {
                  'output_dir': 'data/ci_test/phase4',
                  'baseline_file': 'baseline_config.json',
                  'threshold_file': 'threshold_config.json',
                  'risk_report_file': 'risk_report.json',
                  'drift_log_file': 'drift_log.csv',
              },
              'random_state': 42,
          }
          with open('config/ci_test_phase4.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)

          from src.phase4_risk_engine.phase4.config import Phase4Config
          from src.phase4_risk_engine.phase4.artifact_reader import Phase3ArtifactReader
          from src.phase4_risk_engine.phase4.baseline import BaselineComputer
          from src.phase4_risk_engine.phase4.dynamic_threshold import DynamicThresholdUpdater
          from src.phase4_risk_engine.phase4.cross_modal import CrossModalFusionDetector
          from src.phase4_risk_engine.phase4.risk_scorer import RiskScorer
          from src.phase4_risk_engine.phase4.exporter import RiskAdaptiveExporter
          from src.phase4_risk_engine.phase4.pipeline import RiskAdaptivePipeline

          PROJECT_ROOT = Path.cwd()
          p4_config = Phase4Config.from_yaml(PROJECT_ROOT / 'config' / 'ci_test_phase4.yaml')

          reader = Phase3ArtifactReader(
              project_root=PROJECT_ROOT, phase3_dir=p4_config.phase3_dir,
              phase3_metadata=p4_config.phase3_metadata, phase2_dir=p4_config.phase2_dir,
              phase2_metadata=p4_config.phase2_metadata, label_column=p4_config.label_column,
          )
          pipeline = RiskAdaptivePipeline(
              config=p4_config, artifact_reader=reader,
              baseline_computer=BaselineComputer(mad_multiplier=p4_config.mad_multiplier),
              threshold_updater=DynamicThresholdUpdater(window_size=p4_config.window_size, k_schedule=p4_config.k_schedule),
              risk_scorer=RiskScorer(low_upper=p4_config.low_upper, medium_upper=p4_config.medium_upper,
                  high_upper=p4_config.high_upper, cross_modal=CrossModalFusionDetector(biometric_columns=p4_config.biometric_columns)),
              exporter=RiskAdaptiveExporter(output_dir=PROJECT_ROOT / p4_config.output_dir),
              project_root=PROJECT_ROOT,
          )
          result = pipeline.run()
          print(f'Phase 4 complete — risk dist: {result[\"risk_distribution\"]}')
          "

      # ── Phase 5: SHAP Explanation (CI config — 10 background, 20 samples) ──
      - name: Create Phase 5 CI config and metadata
        run: |
          python -c "
          import json, hashlib, yaml
          from pathlib import Path

          def sha256(p):
              h = hashlib.sha256()
              with open(p, 'rb') as f:
                  while chunk := f.read(65536):
                      h.update(chunk)
              return h.hexdigest()

          # Create risk_metadata.json for Phase 5 artifact reader
          p4_dir = Path('data/ci_test/phase4')
          risk_metadata = {
              'artifact_hashes': {
                  'baseline_config.json': {'sha256': sha256(p4_dir / 'baseline_config.json'), 'algorithm': 'SHA-256'},
                  'risk_report.json': {'sha256': sha256(p4_dir / 'risk_report.json'), 'algorithm': 'SHA-256'},
                  'threshold_config.json': {'sha256': sha256(p4_dir / 'threshold_config.json'), 'algorithm': 'SHA-256'},
                  'drift_log.csv': {'sha256': sha256(p4_dir / 'drift_log.csv'), 'algorithm': 'SHA-256'},
              },
          }
          (p4_dir / 'risk_metadata.json').write_text(json.dumps(risk_metadata, indent=2))

          # Write Phase 5 CI config (uses ci_test paths)
          config = {
              'data': {
                  'phase4_dir': 'data/ci_test/phase4',
                  'phase4_metadata': 'data/ci_test/phase4/risk_metadata.json',
                  'phase3_dir': 'data/ci_test/phase3',
                  'phase3_metadata': 'data/ci_test/phase3/classification_metadata.json',
                  'phase2_dir': 'data/ci_test/phase2',
                  'phase2_metadata': 'data/ci_test/phase2/detection_metadata.json',
                  'phase1_train': 'data/ci_test/processed/train_phase1.parquet',
                  'phase1_test': 'data/ci_test/processed/test_phase1.parquet',
                  'label_column': 'Label',
              },
              'shap': {
                  'background_samples': 10,
                  'max_explain_samples': 20,
                  'top_features': 10,
                  'max_waterfall_charts': 5,
                  'max_timeline_charts': 3,
              },
              'output': {
                  'output_dir': 'data/ci_test/phase5',
                  'shap_values_file': 'shap_values.parquet',
                  'explanation_report_file': 'explanation_report.json',
                  'metadata_file': 'explanation_metadata.json',
                  'charts_dir': 'charts',
              },
              'explanation_templates': {
                  'CRITICAL': 'CRITICAL ALERT: Sample {idx} at T={time}. Top factors: {f1} anomaly ({p1:.1f}%), {f2} anomaly ({p2:.1f}%), {f3} anomaly ({p3:.1f}%). Immediate action required.',
                  'HIGH': 'HIGH ALERT: Suspicious activity detected at sample {idx}. Primary indicator: {f1} anomaly contributing {p1:.1f}%.',
                  'MEDIUM': 'MEDIUM: Anomaly detected at sample {idx}. Monitor closely. Key feature: {f1}.',
                  'LOW': 'LOW: Minor anomaly at sample {idx}. No immediate action needed.',
              },
              'biometric_columns': ['Temp', 'SpO2', 'Pulse_Rate', 'SYS', 'DIA', 'Heart_rate', 'Resp_Rate', 'ST'],
              'random_state': 42,
          }
          with open('config/ci_test_phase5.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)
          print('Phase 5 CI config + risk_metadata.json created')
          "

      - name: Run Phase 5 explanation pipeline (CI mode)
        run: |
          python -c "
          import logging, os, time
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          os.environ['CUDA_VISIBLE_DEVICES'] = ''
          os.environ['PHASE5_ENV'] = 'ci'

          from pathlib import Path
          from src.phase5_explanation_engine.security_hardened_phase5 import run_hardened_pipeline

          config_path = Path('config/ci_test_phase5.yaml')
          result = run_hardened_pipeline(allow_overwrite=True, config_path=config_path)
          print(f'Phase 5 complete — {result[\"samples_explained\"]} samples, {result[\"duration_s\"]}s')
          print(f'Assertions: {\"ALL PASSED\" if result[\"assertions_passed\"] else \"FAILED\"}')"

      # ── Integration assertions ──
      - name: Integration assertions — Phase 5
        run: |
          python -c "
          import json, os, sys, stat
          import pandas as pd

          errors = []
          output_dir = 'data/ci_test/phase5'

          # 1. shap_values.parquet exists and is non-empty
          try:
              shap_df = pd.read_parquet(f'{output_dir}/shap_values.parquet')
              assert len(shap_df) > 0, 'shap_values.parquet is empty'
              print(f'PASS  shap_values.parquet: {len(shap_df)} rows, {len(shap_df.columns)} cols')
          except Exception as e:
              errors.append(f'FAIL  shap_values.parquet: {e}')
              print(f'FAIL  shap_values.parquet: {e}')

          # 2. explanation_report.json contains all risk levels
          try:
              report = json.loads(open(f'{output_dir}/explanation_report.json').read())
              levels_found = set()
              for sample in report.get('explanations', report if isinstance(report, list) else []):
                  if isinstance(sample, dict):
                      levels_found.add(sample.get('risk_level', ''))
              # At least some non-NORMAL levels should be present
              assert len(levels_found) > 0, f'No risk levels found in explanations'
              print(f'PASS  explanation_report.json: risk levels = {sorted(levels_found)}')
          except Exception as e:
              errors.append(f'FAIL  explanation_report.json: {e}')
              print(f'FAIL  explanation_report.json: {e}')

          # 3. charts/ contains waterfall, bar, and line files
          try:
              charts_dir = f'{output_dir}/charts'
              chart_files = os.listdir(charts_dir) if os.path.isdir(charts_dir) else []
              has_bar = any('feature_importance' in f for f in chart_files)
              has_waterfall = any('waterfall' in f for f in chart_files)
              has_timeline = any('timeline' in f for f in chart_files)
              assert has_bar, 'Missing feature_importance (bar) chart'
              print(f'PASS  charts/: bar={has_bar}, waterfall={has_waterfall}, timeline={has_timeline} ({len(chart_files)} files)')
          except Exception as e:
              errors.append(f'FAIL  charts/: {e}')
              print(f'FAIL  charts/: {e}')

          # 4. NORMAL samples excluded from SHAP explanation
          try:
              for sample in report.get('explanations', report if isinstance(report, list) else []):
                  if isinstance(sample, dict):
                      assert sample.get('risk_level') != 'NORMAL', f'NORMAL sample found in explanations: idx={sample.get(\"sample_index\")}'
              print(f'PASS  No NORMAL samples in SHAP explanations')
          except Exception as e:
              errors.append(f'FAIL  NORMAL exclusion: {e}')
              print(f'FAIL  NORMAL exclusion: {e}')

          # 5. Waterfall charts only for HIGH/CRITICAL samples
          try:
              waterfall_files = [f for f in chart_files if 'waterfall' in f]
              metadata = json.loads(open(f'{output_dir}/explanation_metadata.json').read())
              # Verify waterfall assertion passed in metadata
              wf_assertion = [a for a in metadata.get('integrity_assertions', []) if 'Waterfall' in a.get('assertion', '')]
              if wf_assertion:
                  assert wf_assertion[0]['status'] == 'PASS', f'Waterfall assertion: {wf_assertion[0]}'
              print(f'PASS  Waterfall charts: {len(waterfall_files)} files, HIGH/CRITICAL only')
          except Exception as e:
              errors.append(f'FAIL  Waterfall validation: {e}')
              print(f'FAIL  Waterfall validation: {e}')

          # 6. Bar chart contains top 10 features
          try:
              importance_assertion = [a for a in metadata.get('integrity_assertions', []) if 'Feature importance' in a.get('assertion', '')]
              if importance_assertion:
                  assert importance_assertion[0]['status'] == 'PASS', f'Feature importance: {importance_assertion[0]}'
              print(f'PASS  Feature importance ranking verified')
          except Exception as e:
              errors.append(f'FAIL  Feature importance: {e}')
              print(f'FAIL  Feature importance: {e}')

          # 7. All 6 integrity assertions passed
          try:
              all_assertions = metadata.get('integrity_assertions', [])
              failed = [a for a in all_assertions if a['status'] != 'PASS']
              assert len(failed) == 0, f'{len(failed)} assertions failed: {failed}'
              print(f'PASS  All {len(all_assertions)} integrity assertions PASSED')
          except Exception as e:
              errors.append(f'FAIL  Integrity assertions: {e}')
              print(f'FAIL  Integrity assertions: {e}')

          # 8. SHAP computation under 60s CI timeout
          try:
              duration = metadata.get('duration_seconds', 999)
              assert duration < 60.0, f'SHAP too slow for CI: {duration}s > 60s'
              print(f'PASS  SHAP duration: {duration}s < 60s CI limit')
          except Exception as e:
              errors.append(f'FAIL  SHAP timeout: {e}')
              print(f'FAIL  SHAP timeout: {e}')

          # 9. Artifacts are read-only (chmod 444)
          try:
              for artifact in ['shap_values.parquet', 'explanation_report.json']:
                  path = f'{output_dir}/{artifact}'
                  mode = os.stat(path).st_mode
                  assert not (mode & stat.S_IWUSR), f'{artifact} is writable (should be 444)'
              print(f'PASS  Artifacts read-only (chmod 444)')
          except Exception as e:
              errors.append(f'FAIL  Read-only check: {e}')
              print(f'FAIL  Read-only check: {e}')

          if errors:
              print(f'\n{len(errors)} FAILURES:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          else:
              print(f'\nAll 9 Phase 5 integration tests PASSED')
          "

      # ── Chart validation ──
      - name: Chart validation — structure and content
        run: |
          python -c "
          import os, sys
          from PIL import Image

          charts_dir = 'data/ci_test/phase5/charts'
          errors = []

          # 1. Waterfall charts are valid PNGs
          waterfall_files = sorted([f for f in os.listdir(charts_dir) if 'waterfall' in f and f.endswith('.png')])
          for wf in waterfall_files:
              try:
                  img = Image.open(os.path.join(charts_dir, wf))
                  assert img.size[0] > 100 and img.size[1] > 100, f'{wf}: too small {img.size}'
                  print(f'PASS  {wf}: {img.size[0]}x{img.size[1]}')
              except Exception as e:
                  errors.append(f'FAIL  {wf}: {e}')

          # 2. Bar chart (feature_importance.png) exists and valid
          bar_path = os.path.join(charts_dir, 'feature_importance.png')
          try:
              img = Image.open(bar_path)
              assert img.size[0] > 100 and img.size[1] > 100
              print(f'PASS  feature_importance.png: {img.size[0]}x{img.size[1]}')
          except Exception as e:
              errors.append(f'FAIL  feature_importance.png: {e}')

          # 3. Timeline charts are valid PNGs
          timeline_files = sorted([f for f in os.listdir(charts_dir) if 'timeline' in f and f.endswith('.png')])
          for tf_file in timeline_files:
              try:
                  img = Image.open(os.path.join(charts_dir, tf_file))
                  assert img.size[0] > 100 and img.size[1] > 100
                  print(f'PASS  {tf_file}: {img.size[0]}x{img.size[1]}')
              except Exception as e:
                  errors.append(f'FAIL  {tf_file}: {e}')

          # 4. Visual regression: compare to baselines if they exist
          baseline_dir = 'tests/baseline_charts'
          if os.path.isdir(baseline_dir):
              for baseline_file in os.listdir(baseline_dir):
                  candidate = os.path.join(charts_dir, baseline_file)
                  if os.path.exists(candidate):
                      base_img = Image.open(os.path.join(baseline_dir, baseline_file))
                      curr_img = Image.open(candidate)
                      if base_img.size != curr_img.size:
                          errors.append(f'REGRESS  {baseline_file}: size changed {base_img.size} → {curr_img.size}')
                      else:
                          print(f'PASS  {baseline_file}: matches baseline size')
          else:
              print(f'SKIP  Visual regression: no baselines in {baseline_dir}/ (generate on first run)')

          if errors:
              print(f'\n{len(errors)} chart validation errors:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          else:
              print(f'\nAll chart validations PASSED')
          " || echo "Chart validation requires Pillow — install with: pip install Pillow"

      - name: Upload Phase 5 charts for visual review
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-charts
          path: data/ci_test/phase5/charts/

      - name: Upload all report sections + Phase 5 artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-integration-artifacts
          path: |
            data/ci_test/phase5/
            results/phase0_analysis/report_section_explanation*.md

  # ─────────────────────────────────────────────────────────────────
  # 5. Docker build (Phase 0 + Phase 1 + Phase 2 + Phase 3 + Phase 4 + Phase 5)
  # ─────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4

      - name: Build combined Docker image
        run: docker build -t analyst/phase0-phase5:${{ github.sha }} .

      - name: Verify Phase 0–5 imports + shap importable
        run: >
          docker run --rm analyst/phase0-phase5:${{ github.sha }}
          -c "
          from src.phase0_dataset_analysis.phase0 import Phase0Config, DataLoader;
          from src.phase1_preprocessing.phase1 import Phase1Config, PreprocessingPipeline;
          from src.phase2_detection_engine.phase2 import Phase2Config, DetectionPipeline;
          from src.phase3_classification_engine.phase3 import Phase3Config, ClassificationPipeline;
          from src.phase4_risk_engine.phase4 import Phase4Config, RiskAdaptivePipeline;
          from src.phase5_explanation_engine.phase5.config import Phase5Config;
          import shap; import tensorflow as tf; import json, pathlib;
          m = tf.keras.Sequential([tf.keras.layers.Dense(1, input_shape=(5,))]);
          m.save_weights('/tmp/_verify.weights.h5');
          pathlib.Path('/tmp/_baseline.json').write_text(json.dumps({'threshold': 0.2}));
          print(f'Phase 0–5: OK — TF {tf.__version__}, shap {shap.__version__}, weights+baseline exportable')
          "

      - name: Tag as v6.0
        run: docker tag analyst/phase0-phase5:${{ github.sha }} analyst/phase0-phase5:6.0
