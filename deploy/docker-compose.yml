# IDS Healthcare CIP — Full Pipeline + Monitoring Sidecar
#
# Architecture:
#   pipeline  (Phase 0-6) → sequential execution
#   monitoring (Phase 7)  → parallel sidecar, read-only artifact access
#
# Usage:
#   docker-compose up              # Run both containers
#   docker-compose up pipeline     # Pipeline only
#   docker-compose up monitoring   # Monitoring only (needs artifacts)
#
# Reproducibility:
#   Full system reproducible via: docker-compose up

version: "3.9"

services:
  # ── Pipeline container: Phase 0-6 sequential ──────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: analyst/phase0-phase6:7.0
    container_name: ids-pipeline
    environment:
      - CUDA_VISIBLE_DEVICES=
      - TF_DETERMINISTIC_OPS=1
      - MPLBACKEND=Agg
    volumes:
      - pipeline-artifacts:/home/analyst/app/data
      - pipeline-results:/home/analyst/app/results
    networks:
      - pipeline_net
    healthcheck:
      test: >
        python -c "
        from src.phase0_dataset_analysis.phase0 import Phase0Config;
        from src.phase5_explanation_engine.phase5.config import Phase5Config;
        print('OK')"
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Monitoring sidecar: Phase 7 parallel ──────────────────────────
  # Starts alongside pipeline — observes all phases from beginning.
  # Read-only access to pipeline artifacts — cannot modify pipeline.
  # Isolated network — monitoring_net for separation of concerns.
  monitoring:
    build:
      context: .
      dockerfile: Dockerfile.monitoring
    image: analyst/phase7-monitoring:1.0
    container_name: ids-monitoring
    depends_on:
      pipeline:
        condition: service_started
    environment:
      - CUDA_VISIBLE_DEVICES=
      - TF_DETERMINISTIC_OPS=1
      - PYTHONUNBUFFERED=1
    volumes:
      # Read-only access to pipeline artifacts
      - pipeline-artifacts:/home/monitor/app/data:ro
      # Writable output for monitoring logs
      - monitoring-output:/home/monitor/app/data/phase7
      - pipeline-results:/home/monitor/app/results
    networks:
      - monitoring_net
    healthcheck:
      test: >
        python -c "
        from src.phase7_monitoring_engine.phase7.config import Phase7Config;
        from src.phase7_monitoring_engine.phase7.heartbeat_receiver import HeartbeatReceiver;
        print('OK')"
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pipeline-artifacts:
    driver: local
  pipeline-results:
    driver: local
  monitoring-output:
    driver: local

networks:
  pipeline_net:
    driver: bridge
  monitoring_net:
    driver: bridge
